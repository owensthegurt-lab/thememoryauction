<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
The Memory Auction
</title>


<link rel="stylesheet" href="style.css">


</head>



<body>


<!-- ==============================
TITLE SCREEN
============================== -->


<div id="titleScreen">


<h1>
THE MEMORY AUCTION
</h1>


<p>
A story about memories, choices, and the things we cannot forget.
</p>



<button onclick="startNewGame()">
New Game
</button>



<button onclick="openSaveSlots()">
Load Game
</button>



<button onclick="openSettings()">
Settings
</button>



</div>







<!-- ==============================
SAVE SCREEN
============================== -->


<div id="saveScreen" style="display:none;">


<h2>
Memory Slots
</h2>



<div class="saveSlot" id="slot1">

Empty

</div>



<button onclick="loadSlot(1)">
Load Slot 1
</button>



<div class="saveSlot" id="slot2">

Empty

</div>



<button onclick="loadSlot(2)">
Load Slot 2
</button>



<div class="saveSlot" id="slot3">

Empty

</div>



<button onclick="loadSlot(3)">
Load Slot 3
</button>



<br>



<button onclick="closeSaveSlots()">
Back
</button>



</div>








<!-- ==============================
GAME
============================== -->


<div id="game" style="display:none;">



<div id="hud">


</div>





<div id="story">


</div>





<div id="choices">


</div>



<br>



<button onclick="saveGame(1)">
Save
</button>



<button onclick="openAchievements()">
Achievements
</button>



<button onclick="openEndingGallery()">
Endings
</button>



</div>









<!-- ==============================
ACHIEVEMENTS
============================== -->


<div id="achievementScreen"
style="display:none;">



<h2>
Achievements
</h2>



<div id="achievementList">

</div>



<button onclick="closeHUDMenus()">
Close
</button>



</div>









<!-- ==============================
ENDING GALLERY
============================== -->


<div id="endingScreen"
style="display:none;">



<h2>
Ending Gallery
</h2>



<div id="endingList">

</div>



<button onclick="closeHUDMenus()">
Close
</button>



</div>









<!-- ==============================
SCRIPTS
============================== -->


<script src="story.js"></script>

<script src="chapter2.js"></script>

<script src="chapter3.js"></script>

<script src="achievements.js"></script>

<script src="ending.js"></script>

<script src="hud.js"></script>

<script src="game.js"></script>



</body>

</html>
