<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
The Memory Auction
</title>


<link rel="stylesheet" href="style.css">


</head>



<body>



<!-- =========================
TITLE SCREEN
========================= -->


<div id="titleScreen">


<h1>
THE MEMORY AUCTION
</h1>



<p>
Every memory has a price.
</p>



<p>
Some things were never meant to be forgotten.
</p>



<button onclick="startNewGame()">
Begin Memory
</button>



<button onclick="openSaveSlots()">
Load Memory
</button>



</div>









<!-- =========================
SAVE SCREEN
========================= -->


<div id="saveScreen" style="display:none;">


<h2>
Memory Slots
</h2>



<div id="slot1" class="saveSlot">
Empty
</div>



<button onclick="loadSlot(1)">
Load Slot 1
</button>





<div id="slot2" class="saveSlot">
Empty
</div>



<button onclick="loadSlot(2)">
Load Slot 2
</button>





<div id="slot3" class="saveSlot">
Empty
</div>



<button onclick="loadSlot(3)">
Load Slot 3
</button>





<button onclick="closeSaveSlots()">
Return
</button>


</div>









<!-- =========================
GAME
========================= -->


<div id="game" style="display:none;">



<div id="hud">

</div>




<div id="story">

</div>




<div id="choices">

</div>





<button onclick="saveGame(1)">
Save Memory
</button>



<button onclick="openAchievements()">
Achievements
</button>



<button onclick="openEndingGallery()">
Ending Gallery
</button>



</div>









<!-- =========================
ACHIEVEMENTS
========================= -->


<div id="achievementScreen" style="display:none;">



<h2>
Recovered Memories
</h2>



<div id="achievementList">

</div>



<button onclick="closeHUDMenus()">
Close
</button>


</div>









<!-- =========================
ENDING GALLERY
========================= -->


<div id="endingScreen" style="display:none;">



<h2>
Memory Archive
</h2>



<div id="endingList">

</div>



<button onclick="closeHUDMenus()">
Close
</button>


</div>









<!-- =========================
SCRIPTS
========================= -->


<script src="story.js"></script>

<script src="chapter2.js"></script>

<script src="chapter3.js"></script>

<script src="chapter4.js"></script>


<script src="achievements.js"></script>

<script src="ending.js"></script>

<script src="hud.js"></script>

<script src="game.js"></script>



</body>


</html>
