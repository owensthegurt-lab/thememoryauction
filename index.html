<!DOCTYPE html>
<html>

<head>

    <title>
        The Memory Auction
    </title>


    <link rel="stylesheet" href="style.css">


</head>


<body>


<div id="game">


    <header>

        <h1>
            THE MEMORY AUCTION
        </h1>

        <p id="subtitle">
            Every memory has a price.
        </p>

    </header>



    <main>


        <div id="story">

            Loading memory...

        </div>



        <div id="choices">

        </div>



    </main>




    <nav id="menu">


        <button onclick="openAchievements()">

            Memory Archive

        </button>



        <button onclick="openAuction()">

            Auction

        </button>



        <button onclick="saveGame()">

            Save Memory

        </button>



        <button onclick="loadGame()">

            Restore Memory

        </button>


    </nav>



    <!-- hidden future UI -->

    <div id="status">


        <div id="credits">

        </div>


        <div id="alignment">

        </div>


    </div>



</div>





<script src="achievements.js"></script>

<script src="auction.js"></script>

<script src="story.js"></script>

<script src="game.js"></script>



</body>


</html>
